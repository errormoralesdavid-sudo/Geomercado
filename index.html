<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo Mercado - Sistema Comercial Pro</title>
    
    <script>
        window.onerror = function(msg, url, line) { return true; };
    </script>

    <style>
        body { background-color: #0b0e14; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 16px; position: relative; }
        
        #menu-principal { display: flex; flex-direction: column; align-items: center; text-align: center; margin-top: 20px; width: 100%; }
        .logo-grande { width: 120px; height: 120px; margin-bottom: 10px; filter: drop-shadow(0 0 12px #00ff66); }
        .main-title { font-size: 28px; font-weight: 900; letter-spacing: 2px; }
        .main-title span { color: #00ff66; }
        .version-tag { font-size: 11px; color: #8fa0b7; font-weight: bold; letter-spacing: 1px; margin-bottom: 15px; text-transform: uppercase; }
        .role-badge { background-color: #161a23; border: 1px solid #242c3d; padding: 6px 16px; border-radius: 20px; font-size: 13px; color: #8fa0b7; margin-bottom: 20px; font-weight: bold; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .btn-menu { background: linear-gradient(135deg, #161a23 0%, #0f121a 100%); border: 1px solid #242c3d; border-radius: 14px; padding: 16px; color: #ffffff; font-size: 13px; font-weight: bold; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .btn-menu .icon { font-size: 26px; color: #00ff66; }

        .modulo-app { display: none; width: 100%; flex-direction: column; gap: 14px; box-sizing: border-box; }
        .header-modulo { display: flex; align-items: center; justify-content: space-between; padding-bottom: 8px; border-bottom: 1px solid #242c3d; }
        .btn-back { background-color: #161a23; border: 1px solid #242c3d; color: #fff; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none;}

        /* CARRUSEL DE HERRAMIENTAS */
        .tools-carousel { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; width: 100%; scrollbar-width: none; }
        .tools-carousel::-webkit-scrollbar { display: none; }
        .btn-tool { background: #161a23; border: 1px solid #313c52; color: #8fa0b7; padding: 10px 14px; border-radius: 8px; font-weight: bold; cursor: pointer; white-space: nowrap; flex-shrink: 0; font-size: 12px;}
        .btn-tool:active { background: #242c3d; }

        /* MODAL CLIENTE */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #11151d; border: 1px solid #00ff66; padding: 20px; border-radius: 16px; width: 90%; max-width: 350px; display: flex; flex-direction: column; gap: 12px; }
        .modal-content h3 { margin: 0; color: #00ff66; text-align: center; }

        .cart-card { background-color: #11151d; border: 1px dashed #242c3d; border-radius: 14px; padding: 12px; width: 100%; box-sizing: border-box; }
        .cart-title { font-size: 11px; color: #8fa0b7; text-transform: uppercase; margin-bottom: 6px; font-weight: bold; text-align: center; }
        .cart-items-container { display: flex; flex-direction: column; gap: 6px; max-height: 160px; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; font-size: 14px; border-bottom: 1px solid #161a23; padding-bottom: 6px; }
        
        .btn-remove-item { background: #ff5252; color: #fff; border: none; border-radius: 6px; padding: 4px 10px; font-weight: bold; cursor: pointer; margin-left: 10px; }
        .btn-qty { background: #242c3d; color: #fff; border: 1px solid #313c52; padding: 4px 10px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        .search-input { width: 100%; background: #0b0e14; border: 1px solid #00ff66; color: #fff; padding: 12px; border-radius: 8px; box-sizing: border-box; text-align: left; font-size: 14px; margin-bottom: 8px;}
        .search-results-box { display: flex; flex-direction: column; gap: 6px; max-height: 120px; overflow-y: auto; }
        .btn-search-result { background: #161a23; border: 1px solid #242c3d; color: #fff; padding: 10px; border-radius: 8px; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center;}

        .display-card { background: linear-gradient(135deg, #161a23 0%, #0d1017 100%); border: 1px solid #242c3d; border-radius: 16px; padding: 15px; text-align: center; width: 100%; box-sizing: border-box; }
        .display-card h2 { font-size: 38px; margin: 4px 0; color: #00ff66; font-weight: 700; }
        .display-card h3 { font-size: 24px; margin: 0; color: #ffffff; }

        .scanner-trigger { background: linear-gradient(90deg, #00b347 0%, #00ff66 100%); border: none; border-radius: 14px; padding: 14px; color: #000000; font-weight: bold; cursor: pointer; width: 100%; box-sizing: border-box; display: flex; justify-content: center; align-items: center; gap: 10px; }
        
        .form-payments { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .input-group { background-color: #161a23; border: 1px solid #242c3d; border-radius: 14px; padding: 14px; display: flex; flex-direction: column; width: 100%; box-sizing: border-box; }
        .input-group label { font-size: 11px; color: #8fa0b7; text-transform: uppercase; margin-bottom: 6px; text-align: center; }
        .input-row { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .input-row input { width: 100%; background: transparent; border: none; color: #ffffff; font-size: 18px; font-weight: bold; outline: none; text-align: center; }
        .input-row input.form-campo { background: #0b0e14; border: 1px solid #242c3d; border-radius: 8px; font-size: 14px; font-weight: normal; padding: 10px; }
        
        .btn-max { background: #313c52; color: #fff; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; font-size: 11px; cursor: pointer;}
        .btn-max:active { background: #00ff66; color: #000; }

        .pm-details { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; width: 100%; }
        .pm-details input { width: 100%; background-color: #0f121a; border: 1px solid #242c3d; border-radius: 8px; padding: 10px; color: #ffffff; font-size: 14px; outline: none; text-align: center; box-sizing: border-box; }

        .admin-form-box { background-color: #161a23; border: 1px solid #242c3d; border-radius: 14px; padding: 15px; display: flex; flex-direction: column; gap: 10px; width: 100%; box-sizing: border-box; }
        .admin-form-box input, .admin-form-box select { width: 100%; background-color: #0b0e14; border: 1px solid #242c3d; padding: 12px; border-radius: 8px; color: #fff; font-size: 14px; outline: none; box-sizing: border-box; text-align: center; }

        .inventory-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; box-sizing: border-box; }
        .product-card { background-color: #161a23; border: 1px solid #242c3d; border-radius: 12px; padding: 12px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; }
        .product-card h4 { margin: 6px 0 2px 0; font-size: 14px; }
        
        .footer-totals { background-color: #11151d; border: 1px solid #242c3d; border-radius: 14px; padding: 14px; width: 100%; box-sizing: border-box; }
        .total-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; color: #8fa0b7; }
        .total-row strong { color: #ffffff; }
        .total-row.final { border-top: 1px dashed #242c3d; margin-top: 6px; padding-top: 8px; font-size: 16px; font-weight: bold; color: #00ff66; }

        .action-container { display: flex; gap: 8px; width: 100%; }
        .btn-clear { flex: 1; background-color: #242c3d; color: #ffffff; border: 1px solid #313c52; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-charge { flex: 1; background-color: #00ff66; color: #000000; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; text-align: center; font-size: 12px; }
        .btn-print { flex: 1; background-color: #fff; color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; text-align: center; font-size: 12px; }

        .cierre-card { background-color: #161a23; border: 1px solid #242c3d; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .cierre-card h4 { margin: 0 0 10px 0; color: #00ff66; border-bottom: 1px dashed #313c52; padding-bottom: 5px;}
        .cierre-item { font-size: 13px; color: #8fa0b7; padding: 4px 0; display: flex; justify-content: space-between; }
        .cierre-item span { color: #fff; font-weight: bold; text-align: right; }
        .highlight-box { background: #0b0e14; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px solid #00ff66;}

        #hidden-qr-reader { display: none; }
        .hidden-file-input { display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="hidden-qr-reader"></div>

        <div id="modal-cliente" class="modal-overlay">
            <div class="modal-content">
                <h3>📝 Datos de Facturación</h3>
                <input type="text" id="cliente-nombre" placeholder="Nombre y Apellido">
                <input type="text" id="cliente-cedula" placeholder="Cédula o RIF">
                <input type="text" id="cliente-dir" placeholder="Dirección del Cliente">
                <button class="btn-charge" onclick="document.getElementById('modal-cliente').style.display='none'">Aplicar a la Factura</button>
            </div>
        </div>

        <div id="menu-principal">
            <div class="logo-grande">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 25 h15 l12 32 h33 l10 -22 h-50" fill="none" stroke="#00ff66" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="45" cy="70" r="6" fill="none" stroke="#00ff66" stroke-width="3"/>
                    <circle cx="70" cy="70" r="6" fill="none" stroke="#00ff66" stroke-width="3"/>
                    <circle cx="58" cy="44" r="7" fill="#ffffff"/>
                </svg>
            </div>
            <div class="main-title"><span id="lbl-nombre-tienda" style="color:#fff;">GEO</span><span style="color:#00ff66;">MERCADO</span></div>
            <div class="version-tag">V17.0 EMPRESARIAL</div>
            <div class="role-badge">Usuario: <span id="txt-rol">Administrador 👑</span></div>

            <div class="menu-grid">
                <button class="btn-menu" onclick="window.cambiarModulo('modulo-caja')"><span class="icon">🛒</span>Caja de Cobro</button>
                <button class="btn-menu" onclick="window.cambiarModulo('modulo-inventario')"><span class="icon">📦</span>Inventario</button>
                <button class="btn-menu" onclick="window.cambiarModulo('modulo-cierre')"><span class="icon">📊</span>Cierre / Historial</button>
                <button class="btn-menu" onclick="window.cambiarModulo('modulo-admin')"><span class="icon">⚙️</span>Ajustes y Perfil</button>
            </div>
        </div>

        <div id="modulo-caja" class="modulo-app">
            <div class="header-modulo">
                <h3>🛒 Caja de Facturación</h3>
                <button class="btn-back" onclick="window.volverAlMenu()">🏠 Menú</button>
            </div>

            <div class="tools-carousel">
                <button class="btn-tool" onclick="window.aparcarFactura()">⏸️ Pausar</button>
                <button class="btn-tool" onclick="window.recuperarFactura()">📂 Recuperar</button>
                <button class="btn-tool" onclick="document.getElementById('modal-cliente').style.display='flex'">📝 Cliente</button>
                <button class="btn-tool" onclick="window.toggleDiscreto()">👁️ Ocultar Precios</button>
            </div>

            <div class="cart-card">
                <div class="cart-title">📝 Artículos en esta Venta</div>
                <div class="cart-items-container" id="items-carrito-factura"></div>
            </div>

            <div class="input-group" style="padding:10px;">
                <input type="text" id="buscador-caja" class="search-input" placeholder="🔍 Escribe para buscar manual..." oninput="window.filtrarBuscadorCaja(this.value)">
                <div id="resultados-busqueda-caja" class="search-results-box"></div>
            </div>

            <div class="display-card">
                <p>TOTAL A PAGAR</p>
                <h2 id="grand-total-usd">$0.00</h2>
                <h3 id="grand-total-ves">0,00 Bs</h3>
            </div>

            <button class="scanner-trigger" onclick="document.getElementById('file-barcode-caja').click()">
                <span style="font-size:20px;">📸</span> LEER CÓDIGO BARRAS
            </button>
            <input type="file" id="file-barcode-caja" class="hidden-file-input" accept="image/*" capture="environment" onchange="window.escanearBarcodeFoto(event, 'caja')">

            <div class="form-payments">
                <div class="input-group">
                    <label>💳 Punto de Venta (Tarjeta)</label>
                    <div class="input-row">
                        <span>Bs</span>
                        <input type="tel" id="pay-ptv" placeholder="0,00" oninput="window.mascaraMoneda(this); window.calcularCaja();">
                        <button class="btn-max" onclick="window.llenarMaximo('ptv')">MAX</button>
                    </div>
                </div>

                <div class="input-group">
                    <label>📲 Pago Móvil Recibido</label>
                    <div class="input-row">
                        <span>Bs</span>
                        <input type="tel" id="pay-pm" placeholder="0,00" oninput="window.mascaraMoneda(this); window.calcularCaja();">
                        <button class="btn-max" onclick="window.llenarMaximo('pm')">MAX</button>
                    </div>
                    <div class="pm-details">
                        <input type="tel" id="pm-phone" placeholder="Teléfono del Cliente">
                        <input type="tel" id="pm-ref" placeholder="Número de Referencia">
                        <button class="btn-clear" style="border:1px solid #00ff66; color:#00ff66; width:100%;" onclick="document.getElementById('file-ocr').click()">📸 LEER CAPTURE AUTO</button>
                        <input type="file" id="file-ocr" class="hidden-file-input" accept="image/*" onchange="window.escanearCapturePagoCompleto(event)">
                    </div>
                </div>

                <div class="input-group">
                    <label>💵 Efectivo Divisas ($)</label>
                    <div class="input-row">
                        <span>$</span>
                        <input type="tel" id="pay-usd" placeholder="0" oninput="window.calcularCaja()">
                        <button class="btn-max" onclick="window.llenarMaximo('usd')">MAX</button>
                    </div>
                </div>

                <div class="input-group">
                    <label>🫴 Efectivo Bolívares</label>
                    <div class="input-row">
                        <span>Bs</span>
                        <input type="tel" id="pay-ves" placeholder="0,00" oninput="window.mascaraMoneda(this); window.calcularCaja();">
                        <button class="btn-max" onclick="window.llenarMaximo('ves')">MAX</button>
                    </div>
                </div>
            </div>

            <div class="footer-totals">
                <div class="total-row"><span>Total Recibido:</span><strong id="total-recibido-ves">0,00 Bs</strong></div>
                <div class="total-row final"><span>Diferencia / Vuelto:</span><span id="total-restante-ves">0,00 Bs</span></div>
            </div>

            <div class="action-container">
                <button class="btn-clear" onclick="window.limpiarCaja(false)">LIMPIAR</button>
                <button class="btn-charge" onclick="window.procesarCobro(false)">COBRAR</button>
                <button class="btn-print" onclick="window.procesarCobro(true)">🖨️ TICKET</button>
            </div>
        </div>

        <div id="modulo-inventario" class="modulo-app">
            <div class="header-modulo">
                <h3>📦 Catálogo de Mercancía</h3>
                <button class="btn-back" onclick="window.volverAlMenu()">🏠 Menú</button>
            </div>

            <div class="admin-form-box" id="form-registro-prod">
                <h4 style="margin:0; color:#00ff66; text-align:center;">Registrar Artículo</h4>
                
                <button class="btn-clear" style="border:1px dashed #00ff66; color:#00ff66; background:transparent; width:100%; margin-bottom:10px;" onclick="document.getElementById('file-ocr-proveedor').click()">
                    📸 LEER FACTURA DE PROVEEDOR
                </button>
                <input type="file" id="file-ocr-proveedor" class="hidden-file-input" accept="image/*" onchange="window.escanearFacturaProveedor(event)">

                <input type="text" id="prod-name" placeholder="Nombre (Ej. Mantequilla Nelly)">
                
                <div style="display:flex; gap:10px;">
                    <input type="number" id="prod-costo" placeholder="Costo ($)" oninput="window.calcularGanancia()">
                    <input type="number" id="prod-margen" placeholder="Margen %" oninput="window.calcularGanancia()">
                </div>
                <div style="text-align:center; color:#00ff66; font-size:12px;">Precio Final Sugerido: <strong id="lbl-precio-calc">$0.00</strong></div>

                <div style="display:flex; align-items:center; justify-content:center; gap:10px; background:#0b0e14; padding:10px; border-radius:8px;">
                    <input type="checkbox" id="prod-iva" style="width:20px; height:20px;"> 
                    <label style="color:#8fa0b7; font-size:14px; margin:0;">Sumar IVA (16%) al Vender</label>
                </div>

                <input type="text" id="prod-emoji" placeholder="Elige un Emoji (Ej. 📦, 🧴)" maxlength="2">

                <input type="tel" id="prod-serial" placeholder="Serial / Código de Barras">
                <button class="btn-clear" style="border:1px solid #00ff66; color:#00ff66; width:100%; display:flex; justify-content:center; gap:8px;" onclick="document.getElementById('file-barcode-reg').click()">
                    <span style="font-size:18px;">📸</span> FOTO AL CÓDIGO
                </button>
                <input type="file" id="file-barcode-reg" class="hidden-file-input" accept="image/*" capture="environment" onchange="window.escanearBarcodeFoto(event, 'registro')">

                <select id="prod-type" onchange="window.conmutarCampoCantidad(this.value)">
                    <option value="unidad">Venta por Unidad 📦</option>
                    <option value="peso">Venta al Peso / Kilo ⚖️</option>
                </select>
                <input type="number" id="prod-qty" placeholder="Cantidad Disponible en Tienda">
                
                <button class="btn-charge" onclick="window.agregarProductoNuevo()">Guardar Producto</button>
            </div>

            <input type="text" id="buscador-inventario" class="search-input" placeholder="🔍 Buscar en inventario..." oninput="window.re
