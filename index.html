<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GEOMERCADO</title>
    <style>
        body { background-color: #0b0e14; color: #ffffff; font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; }
        .menu-grid { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .btn-menu { background: #161a23; border: 1px solid #242c3d; border-radius: 14px; padding: 20px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; text-align: left; width: 100%; }
        .modulo-app { display: none; flex-direction: column; gap: 15px; width: 100%; }
        .btn-back { background: #242c3d; color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; border: none; }
        .input-group { background: #161a23; padding: 15px; border-radius: 14px; margin-bottom: 10px; }
        input { width: 100%; background: #0b0e14; border: 1px solid #242c3d; color: #fff; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        button.action { background: #00ff66; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="menu-principal">
        <h1 style="text-align:center;">GEO<span>MERCADO</span></h1>
        <div class="menu-grid">
            <button class="btn-menu" onclick="showModule('modulo-caja')">🛒 Caja de Cobro</button>
            <button class="btn-menu" onclick="showModule('modulo-inventario')">📦 Inventario</button>
        </div>
    </div>

    <div id="modulo-caja" class="modulo-app">
        <button class="btn-back" onclick="showModule('menu-principal')">⬅ Volver</button>
        <div class="input-group">
            <label>Monto a cobrar (Bs):</label>
            <input type="number" id="caja-monto" placeholder="0,00">
        </div>
        <button class="action" onclick="alert('Cobrado')">COBRAR</button>
    </div>

    <div id="modulo-inventario" class="modulo-app">
        <button class="btn-back" onclick="showModule('menu-principal')">⬅ Volver</button>
        <h3>Inventario</h3>
        <input type="text" id="prod-nombre" placeholder="Nombre producto">
        <button class="action" onclick="agregarProd()">Guardar</button>
        <div id="lista-prod"></div>
    </div>
</div>

<script>
    // ESTA FORMA DE PROGRAMAR ES ANTIGUA Y COMPATIBLE CON TODOS LOS TELÉFONOS
    function showModule(id) {
        document.getElementById('menu-principal').style.display = 'none';
        document.getElementById('modulo-caja').style.display = 'none';
        document.getElementById('modulo-inventario').style.display = 'none';
        
        var target = document.getElementById(id);
        if(target) target.style.display = 'flex';
    }

    function agregarProd() {
        var nombre = document.getElementById('prod-nombre').value;
        alert("Producto " + nombre + " guardado.");
    }
</script>

</body>
</html>
