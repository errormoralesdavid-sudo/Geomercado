<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOMERCADO - Sistema Comercial</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background-color: #0b0e14; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 16px; }
        
        /* CABECERA Y MENÚ */
        #menu-principal { display: flex; flex-direction: column; align-items: center; text-align: center; margin-top: 20px; width: 100%; }
        .logo-grande { width: 120px; height: 130px; margin-bottom: 10px; filter: drop-shadow(0 0 12px #00ff66); }
        .main-title { font-size: 28px; font-weight: 900; letter-spacing: 2px; }
        .main-title span { color: #00ff66; }
        .role-badge { background-color: #161a23; border: 1px solid #242c3d; padding: 6px 16px; border-radius: 20px; font-size: 13px; color: #8fa0b7; margin-bottom: 20px; font-weight: bold; cursor: pointer; }
        .role-badge span { color: #00ff66; }
        .menu-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .btn-menu { background: linear-gradient(135deg, #161a23 0%, #0f121a 100%); border: 1px solid #242c3d; border-radius: 14px; padding: 16px; color: #ffffff; font-size: 15px; font-weight: bold; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .btn-menu:focus { border-color: #00ff66; box-shadow: 0 0 10px rgba(0, 255, 102, 0.2); }
        .btn-menu .icon { font-size: 22px; color: #00ff66; }

        .modulo-app { display: none; width: 100%; flex-direction: column; gap: 14px; }
        .header-modulo { display: flex; align-items: center; justify-content: space-between; padding-bottom: 8px; border-bottom: 1px solid #242c3d; }
        .btn-back { background-color: #161a23; border: 1px solid #242c3d; color: #fff; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* PANTALLA DE TRABAJO */
        .display-card { background: linear-gradient(135deg, #161a23 0%, #0d1017 100%); border: 1px solid #242c3d; border-radius: 16px; padding: 15px; text-align: center; }
        .display-card h2 { font-size: 34px; margin: 4px 0; color: #ffffff; font-weight: 700; }
        
        /* LISTA DE COMPRAS EN FACTURA */
        .cart-list { background-color: #11151d; border: 1px solid #242c3d; border-radius: 12px; padding: 10px; max-height: 100px; overflow-y: auto; font-size: 13px; }
        .cart-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #161a23; }

        .scanner-trigger { background: linear-gradient(90deg, #00b347 0%, #00ff66 100%); border: none; border-radius: 14px; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 14px; color: #000000; font-weight: bold; cursor: pointer; width: 100%; }
        
        .form-payments { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .input-group { background-color: #161a23; border: 1px solid #242c3d; border-radius: 14px; padding: 12px; display: flex; flex-direction: column; width: 100%; box-sizing: border-box; }
        .input-group:focus-within { border-color: #00ff66; box-shadow: 0 0 12px rgba(0, 255, 102, 0.4); }
        .input-group label { font-size: 11px; color: #8fa0b7; text-transform: uppercase; margin-bottom: 6px; text-align: center; }
        .input-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .input-row input { width: 100%; background: transparent; border: none; color: #ffffff; font-size: 20px; font-weight: bold; outline: none; text-align: center; }
        
        .pm-details { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; width: 100%; }
        .pm-details input { width: 100%; background-color: #0f121a; border: 1px solid #242c3d; border-radius: 8px; padding: 10px; color: #ffffff; font-size: 14px; outline: none; text-align: center; box-sizing: border-box; }

        .inventory-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .product-card { background-color: #161a23; border: 1px solid #242c3d; border-radius: 12px; padding: 10px; text-align: center; }
        .badge-peso { font-size: 10px; background-color: #ffca28; color: #000; padding: 2px 6px; border-radius: 4px; font-weight: bold; }

        .footer-totals { background-color: #11151d; border: 1px solid #242c3d; border-radius: 14px; padding: 14px; }
        .total-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; color: #8fa0b7; }
        .total-row.final { border-top: 1px dashed #242c3d; margin-top: 6px; padding-top: 8px; font-size: 16px; font-weight: bold; color: #00ff66; }

        .action-container { display: flex; gap: 12px; width: 100%; }
        .btn-clear { flex: 1; background-color: #242c3d; color: #ffffff; border: 1px solid #313c52; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-charge { flex: 1.5; background-color: #00ff66; color: #000000; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #file-ocr, #file-product-scan { display: none; }
    </style>
</head>
<body>

    <div class="app-container">

        <div id="menu-principal">
            <div class="logo-grande">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 25 h15 l12 32 h33 l10 -22 h-50" fill="none" stroke="#00ff66" stroke-width="4"/>
                    <circle cx="45" cy="70" r="6" fill="none" stroke="#00ff66" stroke-width="3"/>
                    <circle cx="70" cy="70" r="6" fill="none" stroke="#00ff66" stroke-width="3"/>
                    <circle cx="58" cy="44" r="7" fill="#ffffff"/>
                </svg>
            </div>
            <div class="main-title">GEO<span>MERCADO</span></div>
            <div class="role-badge">Usuario: <span id="txt-rol">Administrador 👑</span></div>

            <div class="menu-grid">
                <button class="btn-menu" onclick="cambiarModulo('modulo-caja')"><span class="icon">🛒</span>Caja de Cobro Multimoneda</button>
                <button class="btn-menu" onclick="cambiarModulo('modulo-inventario')"><span class="icon">📦</span>Registro de Productos</button>
                <button class="btn-menu" onclick="cambiarModulo('modulo-admin')"><span class="icon">⚙️</span>Ajustes de Tasa y Usuarios</button>
            </div>
        </div>

        <div id="modulo-caja" class="modulo-app">
            <div class="header-modulo">
                <h3>🛒 Facturación</h3>
                <button class="btn-back" onclick="volverAlMenu()">🏠 Menú</button>
            </div>

            <div id="lista-items-carrito" style="font-size:12px; color:#8fa0b7; text-align:center;">
                Caja lista. Agrega productos desde el catálogo.
            </div>

            <div class="display-card">
                <p>TOTAL FACTURA (SENIAT)</p>
                <h2 id="grand-total-ves">0,00 Bs</h2>
                <span id="sub-total-usd" style="color: #8fa0b7; font-size: 14px;">Ref: $ 0.00</span>
            </div>

            <button class="scanner-trigger" onclick="document.getElementById('file-product-scan').click()">
                📸 RECONOCIMIENTO VISUAL / SERIALES
            </button>
            <input type="file" id="file-product-scan" accept="image/*" capture="environment" onchange="escanearProductoFisico(event)">

            <div class="form-payments">
                <div class="input-group">
                    <label>📲 Pago Móvil Recibido</label>
                    <div class="input-row">
                        <span>Bs</span>
                        <input type="number" id="pay-pm" placeholder="0,00" oninput="calcularCaja()">
                    </div>
                    <div class="pm-details">
                        <input type="text" id="pm-phone" placeholder="Teléfono del Cliente">
                        <input type="text" id="pm-ref" placeholder="Número de Referencia">
                        <button class="btn-ocr-scan" onclick="document.getElementById('file-ocr').click()">📸 AUTO (ESCANEAR CAPTURE)</button>
                        <input type="file" id="file-ocr" accept="image/*" onchange="escanearCapturePagoCompleto(event)">
                    </div>
                </div>

                <div class="input-group">
                    <label>💵 Efectivo Divisas ($)</label>
                    <div class="input-row">
                        <span>$</span>
                        <input type="number" id="pay-usd" placeholder="0.00" oninput="calcularCaja()">
                    </div>
                </div>

                <div class="input-group">
                    <label>🫴 Efectivo Bolívares</label>
                    <div class="input-row">
                        <span>Bs</span>
                        <input type="number" id="pay-ves" placeholder="0,00" oninput="calcularCaja()">
                    </div>
                </div>
            </div>

            <div class="footer-totals">
                <div class="total-row"><span>Total Recibido:</span><strong id="total-recibido-ves">0,00 Bs</strong></div>
                <div class="total-row final"><span>Diferencia / Vuelto:</span><span id="total-restante-ves">0,00 Bs</span></div>
            </div>

            <div class="action-container">
                <button class="btn-clear" onclick="limpiarCaja()">LIMPIAR</button>
                <button class="btn-charge" onclick="procesarCobro()">COBRAR</button>
            </div>
        </div>

        <div id="modulo-inventario" class="modulo-app">
            <div class="header-modulo">
                <h3>📦 Inventario Visual</h3>
                <button class="btn-back" onclick="volverAlMenu()">🏠 Menú</button>
            </div>
            <div class="admin-form-box" id="form-registro-prod">
                <h4 style="margin:0; color:#00ff66;">Registrar Artículo</h4>
                <input type="text" id="prod-name" placeholder="Nombre del Artículo">
                <input type="number" id="prod-price" placeholder="Precio ($)">
                <select id="prod-type">
                    <option value="unidad">Por Unidad 📦</option>
                    <option value="peso">Al Peso / Kilo ⚖️</option>
                </select>
                <button class="btn-charge" onclick="agregarProductoNuevo()">Guardar Artículo</button>
            </div>
            <div class="inventory-grid" id="lista-productos"></div>
        </div>

        <div id="modulo-admin" class="modulo-app">
            <div class="header-modulo">
                <h3>⚙️ Ajustes Contables</h3>
                <button class="btn-back" onclick="volverAlMenu()">🏠 Menú</button>
            </div>
            <div class="admin-form-box">
                <label>📈 Modificar Tasa de Cambio (Bs):</label>
                <input type="number" id="input-tasa-global" value="623.02" oninput="cambiarTasaManual(this.value)">
            </div>
            <div class="admin-card">
                <label>👤 Cambiar Rol de Acceso:</label>
                <button class="btn-charge" onclick="conmutarPerfil('Cajero 👤')" style="background:#242c3d; color:#fff; border:1px solid #313c52; margin-bottom:8px;">Modo Cajero</button>
                <button class="btn-charge" onclick="conmutarPerfil('Administrador 👑')">Modo Admin</button>
            </div>
        </div>

    </div>

    <script>
        var tasaDia = 623.02;
        var totalVentaUSD = 0.00;
        var totalVentaVES = 0.00; 
        var rolActual = "Administrador 👑";
        var productosFacturados = [];

        var productos = [
            { nombre: "Harina PAN", precio: 1.10, tipo: "unidad" },
            { id: 2, nombre: "Manzana Kilo", precio: 3.50, tipo: "peso" }
        ];

        function cambiarModulo(idModulo) {
            // Protección de Roles
            if(idModulo === 'modulo-admin' && rolActual !== "Administrador 👑") {
                alert("Acceso denegado. Solo el Administrador puede cambiar tasas.");
                return;
            }
            document.getElementById('menu-principal').style.display = 'none';
            document.querySelectorAll('.modulo-app').forEach(mod => mod.style.display = 'none');
            document.getElementById(idModulo).style.display = 'flex';
            if(idModulo === 'modulo-inventario') renderizarInventario();
        }

        function volverAlMenu() {
            document.querySelectorAll('.modulo-app').forEach(mod => mod.style.display = 'none');
            document.getElementById('menu-principal').style.display = 'flex';
        }

        function formatVE(monto) {
            return monto.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' Bs';
        }

        function renderizarInventario() {
            var contenedor = document.getElementById('lista-productos');
            var formBox = document.querySelector('.admin-form-box');
            
            // Ocultar formulario de creación si es cajero
            formBoxStyle = (rolActual === "Administrador 👑") ? "flex" : "none";
            document.querySelector('.admin-form-box').style.display = type=formBoxStyle;

            contenedor.innerHTML = "";
            productos.forEach(p => {
                contenedor.innerHTML += `
                    <div class="product-card">
                        <div style="background:#1b202e; padding:15px; border-radius:8px; font-size:24px;">${p.tipo === 'peso' ? '🍎' : '📦'}</div>
                        <h4>${p.nombre}</h4>
                        <p>${p.precio.toFixed(2)} $</p>
                        ${p.tipo === 'peso' ? '<span class="badge-peso">⚖️ Al Peso</span>' : ''}
                        <button class="btn-add-cart" onclick="sumarAlTotal('${p.nombre}', ${p.precio}, '${p.tipo}')">➕ Facturar</button>
                    </div>
                `;
            });
        }

        function agregarProductoNuevo() {
            var name = document.getElementById('prod-name').value;
            var price = parseFloat(document.getElementById('prod-price').value);
            var type = document.getElementById('prod-type').value;
            if(!name || isNaN(price)) return;
            productos.push({ id: Date.now(), nombre: name, precio: price, tipo: type });
            document.getElementById('prod-name').value = "";
            document.getElementById('prod-price').value = "";
            renderizarInventario();
        }

        function sumarAlTotal(nombre, precioUSD) {
            var precioItem = parseFloat(precioUSD) || 0;
            if(isNaN(precioItem)) {
                // Captura si el argumento viene directo de un evento de botón
                precioItem = 1.10;
            }
            totalVentaUSD += precioItem;
            totalVentaVES = totalVentaUSD * tasaDia;
            document.getElementById('grand-total-ves').innerText = formatVE(totalVentaVES);
            document.getElementById('sub-total-usd').innerText = "Ref: $ " + totalVentaUSD.toFixed(2);
            calcularCaja();
        }

        function cambiarTasaManual(nuevaTasa) {
            tasaDia = parseFloat(nuevaTasa) || 623.02;
            totalVentaVES = totalVentaUSD * tasaDia;
            document.getElementById('grand-total-ves').innerText = formatVE(totalVentaVES);
            calcularCaja();
        }

        function calcularCaja() {
            var pm = parseFloat(document.getElementById('pay-pm').value) || 0;
            var usd = parseFloat(document.getElementById('pay-usd').value) || 0;
            var ves = parseFloat(document.getElementById('pay-ves').value) || 0;

            var totalRecibidoVES = pm + (usd * tasaDia) + ves;
            var diferenciaVES = totalVentaVES - totalRecibidoVES;

            document.getElementById('total-recibido-ves').innerText = formatVE(totalRecibidoVES);
            var eRestante = document.getElementById('total-restante-ves');

            if (diferenciaVES > 0.01) {
                eRestante.innerText = formatVE(diferenciaVES) + ' Restante';
                eRestante.style.color = '#ff5252';
            } else if (diferenciaVES < -0.01) {
                var vueltoUSD = Math.abs(diferenciaVES) / tasaDia;
                eRestante.innerText = formatVE(Math.abs(diferenciaVES)) + ' Vuelto (Ref: $' + vueltoUSD.toFixed(2) + ')';
                eRestante.style.color = '#00ff66';
            } else {
                eRestante.innerText = '0,00 Bs Completo';
                eRestante.style.color = '#00ff66';
            }
        }

        function conmutarPerfil(nuevoPerfil) {
            rolActual = nuevoPerfil;
            document.getElementById('current-user').innerText = nuevoPerfil;
            var btnAdminMenu = document.querySelectorAll('.btn-menu')[2];
            if(rolActual === 'Cajero 👤') {
                btnAdminMenu.style.display = 'none';
            } else {
                btnAdminMenu.style.display = 'flex';
            }
            alert("Perfil configurado: " + nuevoPerfil);
            volverAlMenu();
        }

        function escanearProductoFisico(event) {
            var input = event.target;
            if (!input.files || !input.files[0]) return;
            alert("Procesando imagen del artículo...");
            Tesseract.recognize(input.files[0], 'spa')
            .then(({ data: { text } }) => {
                alert("Análisis de Reconocimiento Completado:\n" + text);
                sumarAlTotal(1.50); // Simulación de precio base asignado tras lectura
            });
        }

        function escanearCapturePagoCompleto(event) {
            var input = event.target;
            if (!input.files || !input.files[0]) return;
            document.getElementById('pm-ref').value = "Leyendo...";

            Tesseract.recognize(input.files[0], 'spa')
            .then(({ data: { text } }) => {
                var coincidenciaRef = text.match(/\d{6,12}/);
                var coincidenciaMonto = text.match(/(?:bs|monto|pagado|ref)?[:.\s]*([\d.]+,\d{2})/i);
                if(!coincidenciaMonto) { coincidenciaMonto = text.match(/\b\d+,\d{2}\b/); }

                document.getElementById('pm-ref').value = coincidenciaRef ? coincidenciaRef[0] : "Manual";
                if (coincidenciaMonto) {
                    var montoTexto = coincidenciaMonto[1] || coincidenciaMonto[0];
                    var montoLimpio = montoTexto.replace(/\./g, '').replace(',', '.');
                    document.getElementById('pay-pm').value = parseFloat(montoLimpio);
                }
                calcularCaja();
            });
        }

        function limpiarCaja() {
            totalVentaUSD = 0.00; totalVentaVES = 0.00;
            document.getElementById('pay-pm').value = '';
            document.getElementById('pay-usd').value = '';
            document.getElementById('pay-ves').value = '';
            document.getElementById('pm-phone').value = '';
            document.getElementById('pm-ref').value = '';
            document.getElementById('grand-total-ves').innerText = "0,00 Bs";
            document.getElementById('sub-total-usd').innerText = "Ref: $ 0.00";
            calcularCaja();
        }

        function procesarCobro() {
            alert("Operación completada con éxito.");
            limpiarCaja();
        }

        limpiarCaja();
    </script>
</body>
</html>
