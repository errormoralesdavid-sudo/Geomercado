<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOMERCADO - Sistema de Control Comercial</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { 
            background-color: #0b0e14; 
            color: #ffffff; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 16px; }

        /* PANTALLA PRINCIPAL DE BIENVENIDA */
        #menu-principal { display: flex; flex-direction: column; align-items: center; text-align: center; margin-top: 40px; width: 100%; }
        .logo-grande { width: 140px; height: 140px; margin-bottom: 10px; filter: drop-shadow(0 0 15px #00ff66); }
        .main-title { font-size: 28px; font-weight: 900; letter-spacing: 3px; margin-bottom: 5px; }
        .main-title span { color: #00ff66; }
        .role-badge { background-color: #161a23; border: 1px solid #242c3d; padding: 4px 12px; border-radius: 20px; font-size: 12px; color: #8fa0b7; margin-bottom: 30px; font-weight: bold; }
        .role-badge span { color: #00ff66; }

        .menu-grid { display: flex; flex-direction: column; gap: 14px; width: 100%; }
        .btn-menu { background: linear-gradient(135deg, #161a23 0%, #0f121a 100%); border: 1px solid #242c3d; border-radius: 14px; padding: 18px; color: #ffffff; font-size: 16px; font-weight: bold; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: all 0.3s ease; }
        .btn-menu:focus, .btn-menu:hover { border-color: #00ff66; box-shadow: 0 0 12px rgba(0, 255, 102, 0.2); }
        .btn-menu .icon { font-size: 24px; color: #00ff66; }

        /* SECCIONES OCULTAS POR DEFECTO */
        .modulo-app { display: none; width: 100%; flex-direction: column; gap: 16px; }

        /* CABECERA DE SECCIÓN REUTILIZABLE */
        .header-modulo { display: flex; align-items: center; justify-content: space-between; padding-bottom: 10px; border-bottom: 1px solid #242c3d; }
        .btn-back { background-color: #161a23; border: 1px solid #242c3d; color: #fff; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }

        /* PANTALLA DE COBRO MEJORADA (VERSIÓN 3.5) */
        .display-card { background: linear-gradient(135deg, #161a23 0%, #0d1017 100%); border: 1px solid #242c3d; border-radius: 16px; padding: 18px; text-align: center; box-shadow: 0 6px 20px rgba(0,0,0,0.5); }
        .display-card h2 { font-size: 36px; margin: 6px 0; color: #ffffff; font-weight: 700; }
        .display-card p { margin: 0; color: #00ff66; font-size: 13px; font-weight: 600; letter-spacing: 1px; }

        .scanner-trigger { background: linear-gradient(90deg, #00b347 0%, #00ff66 100%); border: none; border-radius: 14px; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 14px; color: #000000; font-weight: bold; font-size: 14px; cursor: pointer; width: 100%; box-sizing: border-box; }
        .scanner-trigger svg { width: 24px; height: 24px; fill: #000000; }

        .form-payments { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .input-group { background-color: #161a23; border: 1px solid #242c3d; border-radius: 14px; padding: 14px; display: flex; flex-direction: column; box-sizing: border-box; width: 100%; }
        .input-group:focus-within { border-color: #00ff66; box-shadow: 0 0 12px rgba(0, 255, 102, 0.4); background-color: #1a212f; }
        .input-group label { font-size: 11px; color: #8fa0b7; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; text-align: center; }
        .input-row { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; }
        .input-row span { font-size: 20px; font-weight: bold; color: #00ff66; }
        .input-row input { width: 100%; background: transparent; border: none; color: #ffffff; font-size: 20px; font-weight: bold; outline: none; text-align: center; }
        
        /* CORRECCIÓN VISUAL: Subcampos de Pago Móvil centrados uno abajo del otro sin salirse de la pantalla */
        .pm-details { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; width: 100%; }
        .pm-details input { width: 100%; background-color: #0f121a; border: 1px solid #242c3d; border-radius: 8px; padding: 10px; color: #ffffff; font-size: 14px; outline: none; text-align: center; box-sizing: border-box; }
        .btn-ocr-scan { background: #242c3d; border: 1px solid #00ff66; color: #00ff66; border-radius: 8px; padding: 10px; font-size: 13px; font-weight: bold; cursor: pointer; width: 100%; text-align: center; margin-top: 4px; }

        /* CONTENEDOR DE INVENTARIO VISUAL */
        .inventory-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .product-card { background-color: #161a23; border: 1px solid #242c3d; border-radius: 12px; padding: 10px; text-align: center; }
        .product-card img { width: 100%; height: 90px; object-fit: cover; border-radius: 8px; background-color: #0b0e14; margin-bottom: 8px; }
        .product-card h4 { margin: 0 0 4px 0; font-size: 14px; }
        .product-card p { margin: 0; color: #00ff66; font-size: 13px; font-weight: bold; }
        .badge-peso { font-size: 10px; background-color: #ffca28; color: #000; padding: 2px 6px; border-radius: 4px; font-weight: bold; display: inline-block; margin-top: 4px; }

        /* PANEL DE ADMINISTRACIÓN */
        .admin-card { background-color: #161a23; border: 1px solid #242c3d; border-radius: 14px; padding: 15px; margin-bottom: 12px; }
        .admin-card label { display: block; font-size: 13px; color: #8fa0b7; margin-bottom: 6px; }
        .admin-card input { width: 100%; background-color: #0b0e14; border: 1px solid #242c3d; padding: 10px; border-radius: 8px; color: #fff; font-size: 16px; font-weight: bold; outline: none; box-sizing: border-box; }
        .admin-card input:focus { border-color: #00ff66; }

        .footer-totals { background-color: #11151d; border: 1px solid #242c3d; border-radius: 14px; padding: 14px; width: 100%; box-sizing: border-box; }
        .total-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; color: #8fa0b7; }
        .total-row strong { color: #ffffff; }
        .total-row.final { border-top: 1px dashed #242c3d; margin-top: 6px; padding-top: 8px; font-size: 16px; font-weight: bold; color: #00ff66; }

        .action-container { display: flex; gap: 12px; margin-top: 10px; width: 100%; }
        .btn-clear { flex: 1; background-color: #242c3d; color: #ffffff; border: 1px solid #313c52; padding: 14px; border-radius: 12px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .btn-charge { flex: 1.5; background-color: #00ff66; color: #000000; border: none; padding: 14px; border-radius: 12px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 12px rgba(0, 255, 102, 0.2); text-align: center; }
        #camera-preview { display: none; width: 100%; background: #000; border-radius: 16px; overflow: hidden; border: 2px solid #00ff66; }
        #file-ocr { display: none; }
    </style>
</head>
<body>

    <div class="app-container">

        <div id="menu-principal">
            <div class="logo-grande">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
                    <path d="M15 25 h15 l12 32 h33 l10 -22 h-50" fill="none" stroke="#00ff66" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="45" cy="70" r="6" fill="none" stroke="#00ff66" stroke-width="3"/>
                    <circle cx="70" cy="70" r="6" fill="none" stroke="#00ff66" stroke-width="3"/>
                    <circle cx="58" cy="44" r="7" fill="#ffffff"/>
                    <path d="M58 37 c1 -3 3 -2 3 -2" fill="none" stroke="#00ff66" stroke-width="2"/>
                </svg>
            </div>
            <div class="main-title">GEO<span>MERCADO</span></div>
            <div class="role-badge" id="badge-usuario">Usuario Activo: <span id="current-user">Administrador 👑</span></div>

            <div class="menu-grid">
                <button class="btn-menu" onclick="cambiarModulo('modulo-caja')">
                    <span class="icon">🛒</span> 
                    <div>Caja de Cobro Multimoneda</div>
                </button>
                <button class="btn-menu" onclick="cambiarModulo('modulo-inventario')">
                    <span class="icon">📦</span> 
                    <div>Registro de Productos (Stock)</div>
                </button>
                <button class="btn-menu" onclick="cambiarModulo('modulo-admin')">
                    <span class="icon">⚙️</span> 
                    <div>Ajustes de Tasa y Usuarios</div>
                </button>
            </div>
        </div>

        <div id="modulo-caja" class="modulo-app">
            <div class="header-modulo">
                <h3>🛒 Caja de Ventas</h3>
                <button class="btn-back" onclick="volverAlMenu()">🏠 Menú</button>
            </div>

            <div class="display-card">
                <p>TOTAL FACTURA (SENIAT)</p>
                <h2 id="grand-total-ves">5.647,50 Bs</h2>
                <span style="color: #8fa0b7; font-size: 14px;">Ref: $ 125.50</span>
            </div>

            <div id="camera-preview">
                <div id="interactive-reader" style="width: 100%;"></div>
            </div>

            <button class="scanner-trigger" onclick="encenderEscaner()">
                <svg viewBox="0 0 24 24"><path d="M4 4h4v2H4v4H2V4c0-1.1.9-2 2-2zm16 0c1.1 0 2 .9 2 2v4h-2V6h-4V4h4zM4 20h4v2H4c-1.1 0-2-.9-2-2v-4h2v4zm16 0h-4v2h4c1.1 0 2-.9 2-2v-4h-2v4zM7 12h10v2H7zm0-3h10v2H7zm0 6h10v2H7z"/></svg>
                ESCANEAR QR / IMAGEN DEL PRODUCTO
            </button>

            <div class="form-payments">
                <div class="input-group">
                    <label>📲 Pago Móvil Recibido</label>
                    <div class="input-row">
                        <span>Bs</span>
                        <input type="number" id="pay-pm" placeholder="0,00" oninput="calcularCaja()">
                    </div>
                    <div class="pm-details">
                        <input type="text" id="pm-phone" placeholder="Teléfono del Cliente">
                        <input type="text" id="pm-ref" placeholder="Número de Referencia / Serial">
                        <button class="btn-ocr-scan" onclick="document.getElementById('file-ocr').click()">📸 AUTO (ESCANEAR CAPTURE)</button>
                        <input type="file" id="file-ocr" accept="image/*" onchange="escanearCapturePagoCompleto(event)">
                    </div>
                </div>

                <div class="input-group">
                    <label>💵 Efectivo Divisas ($)</label>
                    <div class="input-row">
                        <span>$</span>
                        <input type="number" id="pay-usd" placeholder="0.00" oninput="calcularCaja()">
                    </div>
                </div>

                <div class="input-group">
                    <label>🫴 Efectivo Bolívares</label>
                    <div class="input-row">
                        <span>Bs</span>
                        <input type="number" id="pay-ves" placeholder="0,00" oninput="calcularCaja()">
                    </div>
                </div>
            </div>

            <div class="footer-totals">
                <div class="total-row"><span>Total Recibido:</span><strong id="total-recibido-ves">0,00 Bs</strong></div>
                <div class="total-row final"><span>Diferencia / Vuelto:</span><span id="total-restante-ves">5.647,50 Bs Restante</span></div>
            </div>

            <div class="action-container">
                <button class="btn-clear" onclick="limpiarCaja()">LIMPIAR</button>
                <button class="btn-charge" onclick="procesarCobro()">COBRAR</button>
            </div>
        </div>

        <div id="modulo-inventario" class="modulo-app">
            <div class="header-modulo">
                <h3>📦 Catálogo de Stock</h3>
                <button class="btn-back" onclick="volverAlMenu()">🏠 Menú</button>
            </div>

            <div class="inventory-grid">
                <div class="product-card">
                    <svg viewBox="0 0 100 80" style="width:100%; height:90px; background:#1b202e; border-radius:8px; margin-bottom:6px;"><text x="50%" y="55%" text-anchor="middle" fill="#8fa0b7" font-size="12">🌾 Harina PAN</text></svg>
                    <h4>Harina PAN Frita</h4>
                    <p>1,10 $</p>
                </div>
                <div class="product-card">
                    <svg viewBox="0 0 100 80" style="width:100%; height:90px; background:#1b202e; border-radius:8px; margin-bottom:6px;"><text x="50%" y="55%" text-anchor="middle" fill="#8fa0b7" font-size="12">🍎 Manzana</text></svg>
                    <h4>Manzana Kilo</h4>
                    <p>3,50 $</p>
                    <span class="badge-peso">⚖️ Venta al Peso</span>
                </div>
            </div>
        </div>

        <div id="modulo-admin" class="modulo-app">
            <div class="header-modulo">
                <h3>⚙️ Panel de Control</h3>
                <button class="btn-back" onclick="volverAlMenu()">🏠 Menú</button>
            </div>

            <div class="admin-card">
                <label>📈 Ajustar Tasa del Dólar Oficial/P2P (Bs):</label>
                <input type="number" id="input-tasa-global" value="623.02" oninput="cambiarTasaManual(this.value)">
            </div>

            <div class="admin-card">
                <label>👥 Switch de Perfiles de Prueba:</label>
                <button class="btn-charge" onclick="conmutarPerfil('Cajero 👤')" style="background:#242c3d; color:#fff; border:1px solid #313c52; margin-bottom:8px;">Activar Perfil Cajero</button>
                <button class="btn-charge" onclick="conmutarPerfil('Administrador 👑')">Activar Perfil Admin</button>
            </div>
        </div>

    </div>

    <script>
        var tasaDia = 623.02;
        var totalVentaUSD = 125.50;
        var totalVentaVES = totalVentaUSD * tasaDia; 
        var html5QrcodeScanner = null;
        var rolActual = "Administrador 👑";

        function cambiarModulo(idModulo) {
            document.getElementById('menu-principal').style.display = 'none';
            document.querySelectorAll('.modulo-app').forEach(mod => mod.style.display = 'none');
            document.getElementById(idModulo).style.display = 'flex';
        }

        function volverAlMenu() {
            document.querySelectorAll('.modulo-app').forEach(mod => mod.style.display = 'none');
            document.getElementById('menu-principal').style.display = 'flex';
        }

        function cambiarTasaManual(nuevaTasa) {
            var tasaNum = parseFloat(nuevaTasa) || tasaDia;
            tasaDia = tasaNum;
            totalVentaVES = totalVentaUSD * tasaDia;
            document.getElementById('grand-total-ves').innerText = totalVentaVES.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' Bs';
            calcularCaja();
        }

        function conmutarPerfil(nuevoPerfil) {
            rolActual = nuevoPerfil;
            document.getElementById('current-user').innerText = nuevoPerfil;
            alert("Perfil cambiado a: " + nuevoPerfil);
            volverAlMenu();
        }

        // FORMATO CON PUNTO INCLUIDO PARA VENEZUELA
        function formatVE(monto) {
            return monto.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' Bs';
        }

        function calcularCaja() {
            var pm = parseFloat(document.getElementById('pay-pm').value) || 0;
            var usd = parseFloat(document.getElementById('pay-usd').value) || 0;
            var ves = parseFloat(document.getElementById('pay-ves').value) || 0;

            var usdEnVes = usd * tasaDia;
            var totalRecibidoVES = pm + usdEnVes + ves;
            var diferenciaVES = totalVentaVES - totalRecibidoVES;

            document.getElementById('total-recibido-ves').innerText = formatVE(totalRecibidoVES);
            
            var eRestante = document.getElementById('total-restante-ves');
            if (diferenciaVES > 0.01) {
                eRestante.innerText = formatVE(diferenciaVES) + ' Restante';
                eRestante.style.color = '#ff5252';
            } else if (diferenciaVES < -0.01) {
                var vueltoUSD = Math.abs(diferenciaVES) / tasaDia;
                eRestante.innerText = formatVE(Math.abs(diferenciaVES)) + ' Vuelto (Ref: $' + vueltoUSD.toFixed(2) + ')';
                eRestante.style.color = '#00ff66';
            } else {
                eRestante.innerText = '0,00 Bs Completo';
                eRestante.style.color = '#00ff66';
            }
        }

        function escanearCapturePagoCompleto(event) {
            var input = event.target;
            if (!input.files || !input.files[0]) return;

            var eRef = document.getElementById('pm-ref');
            var eMonto = document.getElementById('pay-pm');
            eRef.value = "Leyendo...";

            Tesseract.recognize(input.files[0], 'spa')
            .then(({ data: { text } }) => {
                var coincidenciaRef = text.match(/\d{6,12}/);
                var coincidenciaMonto = text.match(/(?:bs|monto|pagado|ref)?[:.\s]*([\d.]+,\d{2})/i);
                if(!coincidenciaMonto) { coincidenciaMonto = text.match(/\b\d+,\d{2}\b/); }

                if (coincidenciaRef) { eRef.value = coincidenciaRef[0]; } else { eRef.value = "Manual"; }
                if (coincidenciaMonto) {
                    var montoTexto = coincidenciaMonto[1] || coincidenciaMonto[0];
                    var montoLimpio = montoTexto.replace(/\./g, '').replace(',', '.');
                    eMonto.value = parseFloat(montoLimpio);
                } else {
                    alert("Referencia leída. Completa el monto.");
                }
                calcularCaja();
            }).catch(err => {
                eRef.value = "";
                alert("Error al analizar la imagen.");
            });
        }

        function convertirAuxiliar(origen) {
            var inputBs = document.getElementById('calc-bs');
            var inputUsd = document.getElementById('calc-usd');
            if (origen === 'bs') {
                var valBs = parseFloat(inputBs.value);
                if (!isNaN(valBs)) { inputUsd.value = (valBs / tasaDia).toFixed(2); } else { inputUsd.value = ''; }
            } else if (origen === 'usd') {
                var valUsd = parseFloat(inputUsd.value);
                if (!isNaN(valUsd)) { inputBs.value = (valUsd * tasaDia).toFixed(2); } else { inputBs.value = ''; }
            }
        }

        function encenderEscaner() {
            var areaCamara = document.getElementById('camera-preview');
            if (areaCamara.style.display === 'block') {
                areaCamara.style.display = 'none';
                if(html5QrcodeScanner) html5QrcodeScanner.clear();
                return;
            }
            areaCamara.style.display = 'block';
            html5QrcodeScanner = new Html5Qrcode("interactive-reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                qrCodeMessage => {
                    alert("Código detectado: " + qrCodeMessage);
                    areaCamara.style.display = 'none';
                    html5QrcodeScanner.clear();
                },
                errorMessage => { }
            ).catch(err => { alert("Escáner listo."); });
        }

        function limpiarCaja() {
            document.getElementById('pay-pm').value = '';
            document.getElementById('pay-usd').value = '';
            document.getElementById('pay-ves').value = '';
            document.getElementById('pm-phone').value = '';
            document.getElementById('pm-ref').value = '';
            document.getElementById('calc-bs').value = '';
            document.getElementById('calc-usd').value = '';
            calcularCaja();
        }

        function procesarCobro() {
            alert("Operación completada con éxito.");
            limpiarCaja();
        }

        // Inicialización forzada
        document.getElementById('grand-total-ves').innerText = formatVE(totalVentaVES);
        calcularCaja();
    </script>
</body>
</html>
